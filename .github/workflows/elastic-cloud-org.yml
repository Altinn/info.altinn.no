name: elastic-cloud-org deploy

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/elastic-cloud-org.yml
      - infrastructure/elastic-cloud-org/**
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/elastic-cloud-org.yml
      - infrastructure/elastic-cloud-org/**
  workflow_dispatch:
    inputs:
      log_level:
        required: true
        description: Terraform Log Level
        default: ERROR
        type: choice
        options:
          - TRACE
          - DEBUG
          - INFO
          - WARN
          - ERROR

env:
  TF_STATE_NAME: elastic-cloud-org.tfstate
  WORKING_DIRECTORY: ./infrastructure/elastic-cloud-org
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_ALTINN_PORTALER_PROD }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID_ALTINN_PORTALER_PROD }}
  TF_VAR_elastic_cloud_api_key: ${{ secrets.ELASTIC_CLOUD_API_KEY }}

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  plan:
    name: Plan
    environment: prod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Terraform Plan
        uses: Altinn/altinn-platform/actions/terraform/plan@f5fa38e997b5c025ea5f9b56708fdd0aa38104ed # main
        with:
          working_directory: ${{ env.WORKING_DIRECTORY }}
          oidc_type: environment
          oidc_value: prod
          arm_client_id: ${{ env.ARM_CLIENT_ID }}
          arm_subscription_id: ${{ env.ARM_SUBSCRIPTION_ID }}
          tf_state_name: ${{ env.TF_STATE_NAME }}
          tf_log_level: ${{ github.event.inputs.log_level || 'ERROR' }}
          gh_token: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy
    environment: prod
    if: github.ref == 'refs/heads/main'
    needs: plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Terraform Apply
        uses: Altinn/altinn-platform/actions/terraform/apply@f5fa38e997b5c025ea5f9b56708fdd0aa38104ed # main
        with:
          working_directory: ${{ env.WORKING_DIRECTORY }}
          oidc_type: environment
          oidc_value: prod
          arm_client_id: ${{ env.ARM_CLIENT_ID }}
          arm_subscription_id: ${{ env.ARM_SUBSCRIPTION_ID }}
          tf_state_name: ${{ env.TF_STATE_NAME }}
          tf_log_level: ${{ github.event.inputs.log_level || 'ERROR' }}
          gh_token: ${{ secrets.GITHUB_TOKEN }}
