apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - elasticsearch-secretstore.yaml
  - elasticsearch-secrets.yaml

images:
- name: umbraco

patches:
  - target:
      kind: Vault
      name: umbraco
    patch: |-
      - op: add
        path: /spec/tags/env
        value: tt02
  - target:
      kind: Deployment
      name: umbraco
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: Elasticsearch__Endpoint
          valueFrom:
            secretKeyRef:
              name: elasticsearch
              key: endpoint
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: Elasticsearch__ApiKey
          valueFrom:
            secretKeyRef:
              name: elasticsearch
              key: api-key
  - target:
      kind: HTTPRoute
      name: umbraco
    patch: |-
      - op: add
        path: /spec/hostnames
        value:
          - infoportal.tt02.dis-core.altinn.cloud
