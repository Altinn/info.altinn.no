apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base

images:
  - name: umbraco
    newName: altinncr.azurecr.io/ghcr.io/altinn/umbraco
    newTag: will-be-replaced

patches:
  - target:
      kind: Vault
      name: umbraco
    patch: |-
      - op: add
        path: /spec/tags/env
        value: at22
      - op: add
        path: /spec/groupObjectId
        value: 42688626-6503-4d1d-8aa4-e1e5fef2b4be
  - target:
      kind: HTTPRoute
      name: umbraco
    patch: |-
      - op: add
        path: /spec/hostnames
        value:
          - infoportal.at22.dis-core.altinn.cloud
