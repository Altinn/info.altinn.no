apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: umbraco-secret-store
    kind: SecretStore
  target:
    name: cloudflare
    creationPolicy: Owner
  data:
    - secretKey: Cloudflare--ZoneId
      remoteRef:
        key: Cloudflare--ZoneId
    - secretKey: Cloudflare--ApiToken
      remoteRef:
        key: Cloudflare--ApiToken
