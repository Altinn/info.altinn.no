apiVersion: apps/v1
kind: Deployment
metadata:
  name: umbraco
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: umbraco
  template:
    metadata:
      labels:
        app.kubernetes.io/name: umbraco
        azure.workload.identity/use: "true"
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
        linkerd.io/inject: enabled
    spec:
      serviceAccountName: umbraco
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: umbraco
          image: umbraco:1
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
          env:
            - name: ConnectionStrings__umbracoDbDSN
              value: Server=tcp:${UMBRACO_SQL_CONN_FQDN},1433;Initial Catalog=umbraco;Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;Authentication=\"Active Directory Default\"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: umbraco-data
              mountPath: /app/umbraco/Data
            - name: umbraco-media
              mountPath: /app/wwwroot/media
            - name: umbraco-logs
              mountPath: /app/umbraco/Logs
      volumes:
        - name: umbraco-data
          persistentVolumeClaim:
            claimName: umbraco-data
        - name: umbraco-media
          persistentVolumeClaim:
            claimName: umbraco-media
        - name: umbraco-logs
          emptyDir: {}
