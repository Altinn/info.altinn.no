apiVersion: apps/v1
kind: Deployment
metadata:
  name: umbraco
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: umbraco
  template:
    metadata:
      labels:
        app.kubernetes.io/name: umbraco
        azure.workload.identity/use: "true"
      annotations:
        cluster-autoscaler.kubernetes.io/safe-to-evict: "true"
        linkerd.io/inject: enabled
        config.linkerd.io/skip-outbound-ports: "443,587"
    spec:
      serviceAccountName: umbraco
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: umbraco
          image: umbraco:1
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
          env:
            - name: ASPNETCORE_FORWARDEDHEADERS_ENABLED
              value: "true"
            - name: KeyVault__AkvUri
              valueFrom:
                configMapKeyRef:
                  name: umbraco-dis-vault
                  key: AkvUri
            - name: ConnectionStrings__umbracoDbDSN
              value: "Data Source=|DataDirectory|/Umbraco.sqlite.db;Cache=Shared;Foreign Keys=True;Pooling=True"
            - name: ConnectionStrings__umbracoDbDSN_ProviderName
              value: "Microsoft.Data.Sqlite"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.monitoring.svc.cluster.local:4317
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: grpc
            - name: OTEL_SERVICE_NAME
              value: infoportal
            - name: POD_UID
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.uid
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "k8s.pod.uid=$(POD_UID)"
            - name: Cloudflare__ZoneId
              valueFrom:
                secretKeyRef:
                  name: cloudflare
                  key: Cloudflare--ZoneId
            - name: Cloudflare__ApiToken
              valueFrom:
                secretKeyRef:
                  name: cloudflare
                  key: Cloudflare--ApiToken
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          volumeMounts:
            - name: umbraco-data
              mountPath: /app/umbraco/Data
            - name: umbraco-media
              mountPath: /app/wwwroot/media
            - name: umbraco-logs
              mountPath: /app/umbraco/Logs
      volumes:
        - name: umbraco-data
          persistentVolumeClaim:
            claimName: umbraco-data
        - name: umbraco-media
          persistentVolumeClaim:
            claimName: umbraco-media
        - name: umbraco-logs
          emptyDir: {}
